# APPROVED INSTRUMENT REGISTRY (catalog).
#
# This is the CATALOG of Korean-listed instruments the Instrument Translator may
# map economic exposures onto. It is NOT the trading allow-list — that lives in
# risk_limits.yml and starts EMPTY (deny-by-default). An instrument is only
# tradable when BOTH (a) active: true here AND (b) its ticker is in
# risk_limits.allowed_instruments. New tickers require explicit operator approval.
#
# IMPORTANT: every `ticker` MUST be verified against live Kiwoom master data
# (name, listing status, exchange route) before activation. Market-derived
# metrics (adv_krw, avg_spread_bps, aum_krw, tracking_error_bps, liquidity_score)
# are NULL here and are populated at runtime by the InstrumentMetrics service
# from live data (Phase 3). An instrument with stale/empty metrics fails the
# liquidity risk checks and cannot trade.
#
# Defaults below are conservative: everything active:false; leveraged/inverse are
# restricted to the HEDGE_BOOK and stay inactive until explicitly whitelisted.

schema_version: 1

